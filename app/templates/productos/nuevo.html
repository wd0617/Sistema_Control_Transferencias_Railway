{% extends 'base.html' %}

{% block title %}Nuevo Producto{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-plus me-2"></i>Nuevo Producto</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('productos.nuevo') }}" enctype="multipart/form-data">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre del producto</label>
                        <input type="text" name="nombre" class="form-control" required placeholder="Ej: Arroz, Aceite...">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Categoría</label>
                        <select name="categoria" class="form-select">
                            {% for val, label in categorias %}
                            <option value="{{ val }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Tipo de medida</label>
                        <select name="tipo_medida" class="form-select">
                            <option value="unidad">Por unidad (u)</option>
                            <option value="peso">Por peso (kg)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Precio</label>
                        <div class="input-group">
                            <input type="text" name="precio" class="form-control" required placeholder="0,00">
                            <span class="input-group-text">€</span>
                        </div>
                        <div class="form-text">Si es por peso, indicá el precio por kg. Si es por unidad, el precio de cada una.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Foto del producto</label>
                        <input type="file" name="foto" class="form-control" accept="image/*">
                        <div class="form-text">Formatos: PNG, JPG, JPEG, GIF, WEBP.</div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save me-1"></i>Guardar producto
                        </button>
                        <a href="{{ url_for('productos.lista') }}" class="btn btn-outline-secondary mt-2">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
