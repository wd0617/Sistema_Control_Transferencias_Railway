{% extends 'base.html' %}

{% block title %}Editar Producto{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-edit me-2"></i>Editar Producto</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('productos.editar', producto_id=producto.id) }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre</label>
                        <input type="text" name="nombre" class="form-control" value="{{ producto.nombre }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tipo de medida</label>
                        <input type="text" class="form-control" value="{% if producto.tipo_medida == 'peso' %}Por peso (kg){% else %}Por unidad{% endif %}" disabled>
                        <div class="form-text">El tipo de medida no se puede cambiar.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Precio</label>
                        <div class="input-group">
                            <input type="text" name="precio" class="form-control" value="{{ "%.2f"|format(producto.precio) }}" required>
                            <span class="input-group-text">€</span>
                        </div>
                        <div class="form-text">Las ventas futuras usarán este precio. Las ventas anteriores quedan con el precio de ese momento.</div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save me-1"></i>Actualizar
                        </button>
                        <a href="{{ url_for('productos.lista') }}" class="btn btn-outline-secondary mt-2">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
