{% extends 'base.html' %}

{% block title %}Venta de Producto{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0"><i class="fas fa-arrow-up me-2"></i>Venta de Producto</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('productos.venta') }}" id="formVenta">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Producto</label>
                        <select name="producto_id" id="producto_id" class="form-select" required onchange="actualizarTotal()">
                            <option value="" data-precio="0">Seleccionar...</option>
                            {% for p in productos %}
                            <option value="{{ p.id }}" data-precio="{{ p.precio }}" data-stock="{{ p.stock_actual }}" data-medida="{{ p.label_medida() }}"
                                {% if request.args.get('producto_id')|int == p.id %}selected{% endif %}>
                                {{ p.nombre }} — {{ p.precio|smart_money }}/{{ p.label_medida() }} (Stock: {{ p.stock_actual|smart_float }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold" id="labelCantidad">Cantidad / Peso</label>
                        <input type="text" name="cantidad" id="cantidad" class="form-control" required placeholder="Ej: 2 o 0,5" oninput="actualizarTotal()">
                        <div class="form-text" id="helpCantidad">Usá coma o punto para decimales.</div>
                    </div>

                    <div class="mb-3" id="campoUnidades" style="display:none;">
                        <label class="form-label">Unidades vendidas (opcional)</label>
                        <input type="number" name="unidades" class="form-control" min="1" placeholder="Ej: 3 piezas">
                        <div class="form-text">Cuántas piezas/unidades equivalen a esos kg.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Notas (opcional)</label>
                        <input type="text" name="notas" class="form-control" placeholder="Ej: Cliente habitual">
                    </div>

                    <div class="alert alert-info">
                        <strong>Total estimado:</strong> <span id="totalDisplay">0,00</span> €
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning">
                            <i class="fas fa-check me-1"></i>Registrar venta
                        </button>
                        <a href="{{ url_for('productos.lista') }}" class="btn btn-outline-secondary mt-2">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function actualizarTotal() {
    const select = document.getElementById('producto_id');
    const cantidadInput = document.getElementById('cantidad');
    const totalDisplay = document.getElementById('totalDisplay');
    const labelCantidad = document.getElementById('labelCantidad');
    const helpCantidad = document.getElementById('helpCantidad');
    const campoUnidades = document.getElementById('campoUnidades');

    const option = select.options[select.selectedIndex];
    const precio = parseFloat(option.dataset.precio) || 0;
    const cantidad = parseFloat(cantidadInput.value.replace(',', '.')) || 0;
    const medida = option.dataset.medida || '';

    if (medida === 'peso') {
        labelCantidad.textContent = 'kg vendidos';
        helpCantidad.textContent = 'Usá coma o punto para decimales. Ej: 1,2';
        campoUnidades.style.display = 'block';
    } else {
        labelCantidad.textContent = 'Cantidad';
        helpCantidad.textContent = 'Usá coma o punto para decimales.';
        campoUnidades.style.display = 'none';
    }

    const total = precio * cantidad;
    totalDisplay.textContent = total.toFixed(2).replace('.', ',');
}

// Inicializar labels al cargar
(function() {
    const select = document.getElementById('producto_id');
    select.querySelectorAll('option').forEach(opt => {
        if (opt.value) {
            const text = opt.textContent.toLowerCase();
            opt.dataset.medida = text.includes('kg') ? 'peso' : 'unidad';
        }
    });
    actualizarTotal();
})();
</script>
{% endblock %}
