{% extends 'base.html' %}

{% block title %}Nuevo Servicio - Sistema de Control de Transferencias{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1><i class="fas fa-plus me-2"></i>Nuevo Servicio</h1>
    </div>
</div>

<div class="card shadow">
    <div class="card-header bg-light">
        <h5 class="mb-0">Información del Servicio</h5>
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('servicios.nuevo') }}">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="nombre" class="form-label">Nombre del Servicio*</label>
                    <input type="text" class="form-control" id="nombre" name="nombre" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="comision" class="form-label">Comisión (%)*</label>
                    <input type="number" class="form-control" id="comision" name="comision" step="0.01" min="0" required>
                </div>
            </div>
            <div class="d-flex justify-content-between mt-3">
                <a href="{{ url_for('servicios.lista') }}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">Guardar Servicio</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
