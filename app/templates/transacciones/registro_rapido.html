{% extends 'base.html' %}

{% block title %}Registro Rápido - Sistema de Control de Transferencias{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <h2 class="mb-3"><i class="fas fa-bolt me-2 text-warning"></i>Registro Rápido</h2>

        <!-- Paso opcional: pegar recibo -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <label class="form-label fw-bold text-muted small">Pegar texto del recibo <span class="fw-normal">(opcional)</span></label>
                <div class="input-group">
                    <textarea id="texto_recibo" class="form-control font-monospace" rows="2"
                        placeholder="Copiá el recibo y pegalo acá para autocompletar..."></textarea>
                    <button class="btn btn-outline-primary" type="button" onclick="analizarRecibo()">
                        <i class="fas fa-magic"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Formulario principal -->
        <div class="card shadow">
            <div class="card-body">
                <form method="POST" action="{{ url_for('transacciones.registro_rapido') }}" id="formRapido">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input type="hidden" name="action" value="confirmar">
                    <input type="hidden" name="cliente_id" id="cliente_id" value="">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Documento del cliente</label>
                        <input type="text" name="documento" id="documento" class="form-control form-control-lg"
                            placeholder="NIE, Pasaporte, DNI..." autocomplete="off" required>
                        <div id="sugerencias" class="list-group position-absolute w-100 shadow-sm" style="z-index:1000; display:none;"></div>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" name="nombre" id="nombre" class="form-control" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Apellido</label>
                            <input type="text" name="apellido" id="apellido" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="text" name="telefono" id="telefono" class="form-control">
                    </div>

                    <hr class="my-4">

                    <div class="row align-items-end">
                        <div class="col-5 mb-3">
                            <label class="form-label fw-bold">Monto (€)</label>
                            <input type="text" name="monto" id="monto" class="form-control form-control-lg"
                                placeholder="0,00" required>
                        </div>
                        <div class="col-7 mb-3">
                            <label class="form-label fw-bold">Servicio</label>
                            <select name="servicio_id" id="servicio_id" class="form-select form-select-lg" required>
                                <option value="">Seleccionar...</option>
                                {% for s in servicios %}
                                <option value="{{ s.id }}">{{ s.nombre }} ({{ s.comision_porcentaje }}%)</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="d-grid mt-3">
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="fas fa-save me-2"></i>Guardar transacción
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Analizar recibo pegado (opcional)
function analizarRecibo() {
    const texto = document.getElementById('texto_recibo').value;
    if (!texto.trim()) return;

    fetch('/api/analizar-recibo', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content
        },
        body: JSON.stringify({texto: texto})
    })
    .then(r => r.json())
    .then(data => {
        if (data.nombre) document.getElementById('nombre').value = data.nombre;
        if (data.apellido) document.getElementById('apellido').value = data.apellido;
        if (data.documento) {
            document.getElementById('documento').value = data.documento;
            buscarClientePorDocumento(data.documento);
        }
        if (data.telefono) document.getElementById('telefono').value = data.telefono;
        if (data.monto) document.getElementById('monto').value = data.monto.toFixed(2).replace('.', ',');
        // Seleccionar servicio si coincide
        if (data.servicio_hint) {
            const opts = document.getElementById('servicio_id').options;
            for (let i = 0; i < opts.length; i++) {
                if (opts[i].text.toUpperCase().includes(data.servicio_hint.toUpperCase())) {
                    document.getElementById('servicio_id').selectedIndex = i;
                    break;
                }
            }
        }
    });
}

// Autocompletado de cliente por documento
let timeoutBuscar = null;
document.getElementById('documento').addEventListener('input', function(e) {
    const q = e.target.value.trim();
    const box = document.getElementById('sugerencias');
    if (q.length < 3) { box.style.display = 'none'; return; }

    clearTimeout(timeoutBuscar);
    timeoutBuscar = setTimeout(() => buscarCliente(q), 300);
});

function buscarCliente(q) {
    fetch('/api/buscar-cliente?q=' + encodeURIComponent(q))
    .then(r => r.json())
    .then(data => {
        const box = document.getElementById('sugerencias');
        const lista = data.resultados || [];
        if (!lista.length) { box.style.display = 'none'; return; }

        box.innerHTML = lista.map(c => `
            <button type="button" class="list-group-item list-group-item-action"
                onclick="seleccionarCliente(${c.id}, '${c.documento}', '${c.nombre}', '${c.apellido}', '${c.telefono || ''}')">
                <strong>${c.nombre} ${c.apellido}</strong>
                <span class="text-muted">— ${c.documento}</span>
            </button>
        `).join('');
        box.style.display = 'block';
    });
}

function buscarClientePorDocumento(doc) {
    fetch('/api/buscar-cliente?q=' + encodeURIComponent(doc))
    .then(r => r.json())
    .then(data => {
        const lista = data.resultados || [];
        if (lista.length === 1) {
            const c = lista[0];
            seleccionarCliente(c.id, c.documento, c.nombre, c.apellido, c.telefono || '');
        }
    });
}

function seleccionarCliente(id, doc, nom, ape, tel) {
    document.getElementById('cliente_id').value = id;
    document.getElementById('documento').value = doc;
    document.getElementById('nombre').value = nom;
    document.getElementById('apellido').value = ape;
    document.getElementById('telefono').value = tel;
    document.getElementById('sugerencias').style.display = 'none';
}

// Cerrar sugerencias al hacer clic fuera
document.addEventListener('click', function(e) {
    if (!e.target.closest('#documento') && !e.target.closest('#sugerencias')) {
        document.getElementById('sugerencias').style.display = 'none';
    }
});

// Pre-llenar desde query params (viene de la extensión)
(function() {
    const p = new URLSearchParams(location.search);
    if (p.get('doc')) document.getElementById('documento').value = p.get('doc');
    if (p.get('nom')) document.getElementById('nombre').value = p.get('nom');
    if (p.get('ape')) document.getElementById('apellido').value = p.get('ape');
    if (p.get('tel')) document.getElementById('telefono').value = p.get('tel');
    if (p.get('mon')) document.getElementById('monto').value = p.get('mon');
    if (p.get('srv')) {
        const srv = p.get('srv').toUpperCase();
        const opts = document.getElementById('servicio_id').options;
        for (let i = 0; i < opts.length; i++) {
            if (opts[i].text.toUpperCase().includes(srv)) {
                document.getElementById('servicio_id').selectedIndex = i;
                break;
            }
        }
    }
    // Si hay documento, buscar cliente
    if (p.get('doc')) {
        setTimeout(() => buscarClientePorDocumento(p.get('doc')), 300);
    }
})();
</script>
{% endblock %}
