<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(135deg, #ff8c00, #ffb700);
      color: #000;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      color: #666;
      min-height: 18px;
    }
    .error { color: #dc3545; }
    .success { color: #198754; }
  </style>
</head>
<body>
  <h3>⚡ Registro Rápido</h3>
  <p style="font-size:12px;color:#666;margin:0 0 12px 0;">
    Estás en: <strong id="site">...</strong>
  </p>
  <button id="btnEnviar">Enviar recibo al sistema</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
